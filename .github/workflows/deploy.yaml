name: prem-rasapalli-zomat-deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 📥 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # 🔐 2. Authenticate to GCP
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v1
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      # ⚙️ 3. Setup gcloud
      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v1

      # 🔍 4. Debug authentication
      - name: Debug Auth
        run: |
          gcloud auth list
          gcloud config list

      # 🔥 5. CRITICAL DEBUG (FIXED INDENTATION)
      - name: Debug Identity (CRITICAL)
        run: |
          echo "== AUTH LIST =="
          gcloud auth list

          echo "== ACCESS TOKEN =="
          gcloud auth print-access-token

      # 🐍 6. Setup Python
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # 📦 7. Install dependencies
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # 🧪 8. Run tests
      - name: Run tests
        run: |
          pytest || echo "No tests found, skipping"

      # 🤖 9. AI Code Review
      - name: AI Code Review
        run: python prem-rasapalli-zomat-app/ai_review.py

      # 🐳 10. Build Docker Image
      - name: Build Docker Image
        run: |
          gcloud builds submit \
          --tag asia-south1-docker.pkg.dev/project-zomat-app/prem-repo/app:v1

      # 🚀 11. Deploy to Cloud Run
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy prem-rasapalli-zomat \
          --image asia-south1-docker.pkg.dev/project-zomat-app/prem-repo/app:v1 \
          --region asia-south1 \
          --platform managed \
          --allow-unauthenticated
