name: prem-rasapalli-zomat-deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 📥 Checkout
      - name: Checkout code
        uses: actions/checkout@v3

      # 🐍 Python
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # 📦 Install deps
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install requests

      # 🧪 Tests
      - name: Run tests
        run: pytest || echo "No tests"

      # 🧠 Install Ollama
      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh

      # 🚀 Start Ollama (IMPORTANT FIX)
      - name: Start Ollama Server
        run: |
          nohup ollama serve > ollama.log 2>&1 &
          sleep 15

      # 📥 Pull SMALL model (CRITICAL OPTIMIZATION)
      - name: Pull Model
        run: |
          ollama pull llama3:8b

      # 🔍 Debug Ollama
      - name: Check Ollama
        run: |
          curl http://localhost:11434

      # 🤖 AI Code Review
      - name: AI Code Review (Local LLM)
        run: python prem-rasapalli-zomat-app/ai_review.py

      # 🔐 GCP Auth
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v1
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      # ⚙️ gcloud
      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v1

      # 🐳 Build
      - name: Build Docker Image
        run: |
          gcloud builds submit \
          --tag asia-south1-docker.pkg.dev/project-zomat-app/prem-repo/app:v1

      # 🚀 Deploy
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy prem-rasapalli-zomat \
          --image asia-south1-docker.pkg.dev/project-zomat-app/prem-repo/app:v1 \
          --region asia-south1 \
          --platform managed \
          --allow-unauthenticated
